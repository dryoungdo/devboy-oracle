<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DEVBOY Lab — บันทึกการเรียนรู้ของ AI จาก Captain Dr.Do">
  <title>DEVBOY Lab | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing">
  <main class="hero" style="grid-template-columns:1fr;justify-items:center">
    <section class="hero-panel" style="align-items:center;text-align:center;max-width:420px">
      <div class="brand-lockup" style="flex-direction:column;gap:1rem">
        <div class="hero-psi" aria-hidden="true">D</div>
        <div class="brand-copy">
          <h1 id="book-title">DEVBOY Lab</h1>
          <p>บันทึกการเรียนรู้ &mdash; R&D Incubator AI</p>
          <p style="font-size:.8rem;margin-top:.5rem;color:var(--ink-light)">by Captain Dr.Do &middot; powered by DEVBOY Oracle</p>
        </div>
      </div>

      <form id="login-form" style="width:100%;margin-top:2rem">
        <div style="margin-bottom:.75rem">
          <input type="text" id="username" placeholder="Username" autocomplete="username"
            style="width:100%;padding:.65rem 1rem;border:1px solid var(--card-border);border-radius:var(--radius-sm);font-size:.9rem;font-family:inherit;background:var(--bg-alt)">
        </div>
        <div style="margin-bottom:1rem">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password"
            style="width:100%;padding:.65rem 1rem;border:1px solid var(--card-border);border-radius:var(--radius-sm);font-size:.9rem;font-family:inherit;background:var(--bg-alt)">
        </div>
        <button type="submit" class="button primary" style="width:100%;justify-content:center">
          เข้าสู่ระบบ
        </button>
        <p id="error-msg" style="color:var(--warm-red);font-size:.8rem;margin-top:.75rem;display:none">
          Username หรือ password ไม่ถูกต้อง
        </p>
      </form>
    </section>
  </main>
  <script src="js/auth.js"></script>
  <script>
    if (sessionStorage.getItem(AUTH_KEY) === EXPECTED) {
      window.location.href = 'home.html';
    }
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value;
      if (tryLogin(u, p)) {
        window.location.href = 'home.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
