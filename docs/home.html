<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DEVBOY Lab — บันทึกการเรียนรู้ของ AI จาก Captain Dr.Do">
  <title>DEVBOY Lab | สารบัญ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing">
  <script src="js/auth.js"></script>
  <script>checkAuth();</script>
  <main class="hero">
    <section class="hero-panel" aria-labelledby="book-title">
      <div class="brand-lockup">
        <div class="hero-psi" aria-hidden="true">D</div>
        <div class="brand-copy">
          <h1 id="book-title">DEVBOY Lab</h1>
          <p>บันทึกการเรียนรู้ &mdash; R&D Incubator</p>
          <p style="font-size:.8rem;margin-top:.25rem;color:var(--ink-light)">DEVBOY AI &middot; Captain Dr.Do</p>
        </div>
      </div>

      <div class="hero-actions">
        <a class="button primary" href="articles/001-birth-of-devboy.html">เริ่มอ่าน &rarr;</a>
      </div>
    </section>

    <section class="hero-art" aria-label="สารบัญ">
      <div class="toc-shell">
        <!-- Search bar -->
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="ค้นหาบทความ... (keyword, tag, ชื่อ)" autocomplete="off">
          <div id="search-results" class="search-results" style="display:none"></div>
        </div>

        <div class="chapter-sections" id="chapter-sections">
          <noscript>
            <p style="padding:1rem;color:var(--ink-light)">กรุณาเปิด JavaScript เพื่อดูสารบัญ</p>
          </noscript>
        </div>
      </div>
    </section>
  </main>

  <script src="js/sidebar.js"></script>
  <script>
  (function () {
    var NAV = window.DEVBOY_NAV;
    if (!NAV) return;

    var container = document.getElementById('chapter-sections');
    if (!container) return;

    var allArticles = [];
    for (var i = 0; i < NAV.length; i++) {
      var links = NAV[i][1];
      for (var j = 0; j < links.length; j++) {
        allArticles.push(links[j]);
      }
    }

    var recentCount = 5;
    var recent = allArticles.slice(-recentCount).reverse();

    var h = '<section class="chapter-section" aria-labelledby="recent-title">'
      + '<h2 id="recent-title">&#128293; ล่าสุด</h2>'
      + '<nav class="chapter-list" aria-label="บทความล่าสุด">';
    for (var r = 0; r < recent.length; r++) {
      var num = recent[r][1].split(' ')[0];
      var title = recent[r][1].substring(num.length + 1);
      h += '<a class="chapter-tile" href="articles/' + recent[r][0] + '">'
        + '<span>' + num + '</span>'
        + '<strong>' + title + '</strong></a>';
    }
    h += '</nav></section>';

    for (var s = 0; s < NAV.length; s++) {
      var sectionName = NAV[s][0];
      var sectionId = 'section-' + s;
      var articles = NAV[s][1];

      h += '<section class="chapter-section" aria-labelledby="' + sectionId + '">'
        + '<h2 id="' + sectionId + '">' + sectionName + '</h2>'
        + '<nav class="chapter-list" aria-label="บทความ ' + sectionName + '">';

      for (var a = 0; a < articles.length; a++) {
        var artNum = articles[a][1].split(' ')[0];
        var artTitle = articles[a][1].substring(artNum.length + 1);
        h += '<a class="chapter-tile" href="articles/' + articles[a][0] + '">'
          + '<span>' + artNum + '</span>'
          + '<strong>' + artTitle + '</strong></a>';
      }

      h += '</nav></section>';
    }

    container.innerHTML = h;
  })();
  </script>
  <script src="js/search.js"></script>
</body>
</html>
