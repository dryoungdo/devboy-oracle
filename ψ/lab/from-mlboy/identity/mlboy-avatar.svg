<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="heat" cx="50%" cy="68%" r="42%">
      <stop offset="0" stop-color="#ffe9c4"/>
      <stop offset="0.18" stop-color="#ffb056"/>
      <stop offset="0.45" stop-color="#d54a14"/>
      <stop offset="0.78" stop-color="#3a0d05"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a5a5a"/>
      <stop offset="1" stop-color="#1f1f1f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="#070707"/>

  <!-- crucible body (trapezoid) -->
  <path d="M 144 198 L 368 198 L 332 376 L 180 376 Z"
        fill="url(#metal)" stroke="#2a2a2a" stroke-width="2"/>

  <!-- crucible rim -->
  <ellipse cx="256" cy="200" rx="112" ry="14" fill="#101010" stroke="#3a3a3a" stroke-width="2"/>
  <ellipse cx="256" cy="200" rx="100" ry="9" fill="url(#heat)" filter="url(#glow)"/>

  <!-- molten core (glow inside) -->
  <ellipse cx="256" cy="298" rx="92" ry="60" fill="url(#heat)" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="256" cy="298" rx="36" ry="22" fill="#fff7e0" filter="url(#glow)" opacity="0.85"/>

  <!-- rising spark (subtle) -->
  <circle cx="234" cy="172" r="3" fill="#ffd380" opacity="0.7"/>
  <circle cx="270" cy="158" r="2" fill="#ffb056" opacity="0.5"/>
  <circle cx="252" cy="142" r="1.5" fill="#ffe9c4" opacity="0.4"/>

  <!-- mark: MLBOY in mono, restrained -->
  <text x="256" y="448" text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="44" font-weight="600" fill="#cfcfcf" letter-spacing="6">MLBOY</text>
  <text x="256" y="478" text-anchor="middle"
        font-family="ui-monospace, monospace"
        font-size="14" fill="#7a7a7a" letter-spacing="3">the crucible</text>
</svg>
